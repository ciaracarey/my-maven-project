# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  # Cloudsmith
  CS_WORKSPACE: 'globex-innovations'
  CS_REPO: 'acme-nonprod'
  CS_SERVICE_SLUG: 'ci_acme_service'

  # Must match <id> in pom.xml
  CLOUDSMITH_SERVER_ID: 'cloudsmith'

steps:
- checkout: self

# ──────────────────────────────
# Cloudsmith: Authenticate via Azure DevOps OIDC
# (latest task, no version pin)
# ──────────────────────────────
- task: CloudsmithCliSetupAndAuthenticate@1.2.0
  displayName: "Cloudsmith: Authenticate via OIDC (no CLI install)"
  inputs:
    authMethod: 'oidc'
    oidcAuthOnly: true          # authenticate only, no CLI install
    pipInstall: false
    cliVersion: ''              # empty = latest (ignored when oidcAuthOnly=true)
    oidcNamespace: '$(CS_WORKSPACE)'
    oidcServiceSlug: '$(CS_SERVICE_SLUG)'

# ──────────────────────────────
# Create Maven settings.xml using short-lived key
# ──────────────────────────────
- bash: |
    set -euo pipefail
    mkdir -p ~/.m2

    cat > ~/.m2/settings.xml <<EOF
    <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                  https://maven.apache.org/xsd/settings-1.0.0.xsd">
      <servers>
        <server>
          <id>cloudsmith</id>
          <username>${CS_SERVICE_SLUG}</username>
          <password>${CLOUDSMITH_API_KEY}</password>
        </server>
      </servers>

      <mirrors>
        <mirror>
          <id>cloudsmith</id>
          <name>Cloudsmith proxy cache</name>
            <url>https://maven.cloudsmith.io/globex-innovations/acme-nonprod/</url>
          <mirrorOf>external:*</mirrorOf>
        </mirror>
      </mirrors>
    </settings>
    EOF
  displayName: "Create Maven settings.xml (Cloudsmith OIDC)"
  env:
    CLOUDSMITH_API_KEY: $(CLOUDSMITH_API_KEY)

# ──────────────────────────────
# Maven resolve dependencies
# ──────────────────────────────
- task: Maven@4
  displayName: "Maven pom check and resolve dependecies"
  inputs:
    mavenPOMFile: 'pom.xml'
    goals: 'package -Dmaven.test.skip=true'
    options: '-s $(HOME)/.m2/settings.xml -U'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    publishJUnitResults: false

# ──────────────────────────────
# Maven: Publish to Cloudsmith
# ──────────────────────────────
- task: Maven@4
  displayName: "Maven: Publish to Cloudsmith"
  inputs:
    mavenPOMFile: 'pom.xml'
    goals: 'deploy -Dmaven.test.skip=true'
    options: '-s $(HOME)/.m2/settings.xml'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    publishJUnitResults: false

# ──────────────────────────────
# Docker: Login to Cloudsmith
# ──────────────────────────────
- bash: |
    echo "$(CLOUDSMITH_API_KEY)" | docker login docker.cloudsmith.io \
      --username $(CS_SERVICE_SLUG) \
      --password-stdin
  displayName: "Docker: Login to Cloudsmith"
  env:
    CLOUDSMITH_API_KEY: $(CLOUDSMITH_API_KEY)

# ──────────────────────────────
# Docker: Build and Push
# ──────────────────────────────
- bash: |
    docker build -t docker.cloudsmith.io/$(CS_WORKSPACE)/$(CS_REPO)/vuln-demo:$(Build.BuildId) .
    docker push docker.cloudsmith.io/$(CS_WORKSPACE)/$(CS_REPO)/vuln-demo:$(Build.BuildId)
  displayName: "Docker: Build and Push to Cloudsmith"
