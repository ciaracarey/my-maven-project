# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

# ──────────────────────────────
# Variables
# ──────────────────────────────
variables:
  # Cloudsmith org + repo
  CS_WORKSPACE: 'globex-innovations'
  CS_REPO: 'acme-nonprod'

  # Cloudsmith service account slug (OIDC)
  CS_SERVICE_SLUG: 'azure_acme_service'

  # Must match <id> in pom.xml repositories/servers
  CLOUDSMITH_SERVER_ID: 'central'

# ──────────────────────────────
# Steps
# ──────────────────────────────
steps:
# 1) Checkout
- checkout: self

# 2) Authenticate to Cloudsmith using Azure DevOps OIDC
- task: CloudsmithCliSetupAndAuthenticate@1.1.1
  displayName: "Cloudsmith: Authenticate via ADO OIDC"
  inputs:
    authMethod: 'oidc'
    oidcAuthOnly: true           # no CLI install
    pipInstall: false
    cliVersion: ''               # ignored when oidcAuthOnly=true
    oidcNamespace: '$(CS_WORKSPACE)'
    oidcServiceSlug: '$(CS_SERVICE_SLUG)'

# 3) Create Maven settings.xml using short-lived API key
- bash: |
    set -euo pipefail
    mkdir -p ~/.m2

    cat > ~/.m2/settings.xml <<EOF
    <settings>
      <servers>
        <server>
          <id>${CLOUDSMITH_SERVER_ID}</id>
          <username>${CS_SERVICE_SLUG}</username>
          <password>${CLOUDSMITH_API_KEY}</password>
        </server>
      </servers>
    </settings>
    EOF
  displayName: "Create Maven settings.xml (Cloudsmith OIDC)"
  env:
    CLOUDSMITH_API_KEY: $(CLOUDSMITH_API_KEY)
    CS_SERVICE_SLUG: $(CS_SERVICE_SLUG)
    CLOUDSMITH_SERVER_ID: $(CLOUDSMITH_SERVER_ID)

# 4) Build / test / deploy
- task: Maven@4
  displayName: "Maven clean deploy"
  inputs:
    mavenPOMFile: 'pom.xml'
    goals: 'clean deploy'
    options: '-s $(HOME)/.m2/settings.xml -U'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
